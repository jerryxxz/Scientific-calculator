<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULUS — Scientific Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="grid-bg"></div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <span class="logo-mark">⬡</span>
                <span class="logo-text">CALCULUS</span>
            </div>
            <div class="header-meta">
                <span class="version-tag">v2.0</span>
                <span class="separator">·</span>
                <span class="mode-tag">SCIENTIFIC</span>
            </div>
        </header>

        <div class="main-layout">
            <!-- LEFT: Main Calculator -->
            <main class="calculator-panel">

                <!-- Display -->
                <div class="display-block">
                    <div class="display-top">
                        <span class="display-label">EXPRESSION</span>
                        <div class="display-indicators">
                            <span class="indicator" id="memIndicator" title="Memory stored">M</span>
                            <span class="indicator active">RAD</span>
                        </div>
                    </div>
                    <div class="display-input-wrap">
                        <input type="text" id="display" class="display-input" readonly placeholder="0" autocomplete="off">
                        <button class="backspace-btn" onclick="backspace()" title="Backspace">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                        </button>
                    </div>
                    <div class="result-bar">
                        <span class="result-eq">=</span>
                        <span id="result" class="result-value">0</span>
                    </div>
                </div>

                <!-- Quick Controls -->
                <div class="quick-controls">
                    <button class="qbtn qbtn-clear" onclick="clearDisplay()">AC</button>
                    <button class="qbtn qbtn-paren" onclick="appendChar('(')">(</button>
                    <button class="qbtn qbtn-paren" onclick="appendChar(')')">)</button>
                    <button class="qbtn qbtn-history" onclick="toggleHistory()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.56"/></svg>
                        HIST
                    </button>
                </div>

                <!-- Numpad + Operators -->
                <div class="keypad-section">
                    <div class="numpad">
                        <button class="key key-num" onclick="appendChar('7')">7</button>
                        <button class="key key-num" onclick="appendChar('8')">8</button>
                        <button class="key key-num" onclick="appendChar('9')">9</button>
                        <button class="key key-op" onclick="appendChar('/')">÷</button>

                        <button class="key key-num" onclick="appendChar('4')">4</button>
                        <button class="key key-num" onclick="appendChar('5')">5</button>
                        <button class="key key-num" onclick="appendChar('6')">6</button>
                        <button class="key key-op" onclick="appendChar('*')">×</button>

                        <button class="key key-num" onclick="appendChar('1')">1</button>
                        <button class="key key-num" onclick="appendChar('2')">2</button>
                        <button class="key key-num" onclick="appendChar('3')">3</button>
                        <button class="key key-op" onclick="appendChar('-')">−</button>

                        <button class="key key-num key-zero" onclick="appendChar('0')">0</button>
                        <button class="key key-num" onclick="appendChar('.')">.</button>
                        <button class="key key-op" onclick="appendChar('+')">+</button>

                        <button class="key key-extra" onclick="appendChar('%')">%</button>
                        <button class="key key-extra" onclick="appendChar('^')">xʸ</button>
                        <button class="key key-extra" onclick="appendFunction('sqrt')">√</button>
                        <button class="key key-equals" onclick="calculate()">=</button>
                    </div>
                </div>

                <!-- Scientific Functions -->
                <div class="sci-section">
                    <div class="sci-group">
                        <div class="sci-group-label">TRIG</div>
                        <div class="sci-buttons">
                            <button class="key key-sci" onclick="appendFunction('sin')">sin</button>
                            <button class="key key-sci" onclick="appendFunction('cos')">cos</button>
                            <button class="key key-sci" onclick="appendFunction('tan')">tan</button>
                            <button class="key key-sci" onclick="appendFunction('asin')">sin⁻¹</button>
                            <button class="key key-sci" onclick="appendFunction('acos')">cos⁻¹</button>
                            <button class="key key-sci" onclick="appendFunction('atan')">tan⁻¹</button>
                        </div>
                    </div>
                    <div class="sci-group">
                        <div class="sci-group-label">LOG / EXP</div>
                        <div class="sci-buttons">
                            <button class="key key-sci" onclick="appendFunction('log')">ln</button>
                            <button class="key key-sci" onclick="appendFunction('log2')">log₂</button>
                            <button class="key key-sci" onclick="appendFunction('log10')">log₁₀</button>
                            <button class="key key-sci" onclick="appendFunction('exp')">eˣ</button>
                            <button class="key key-sci" onclick="appendFunction('fact')">n!</button>
                            <button class="key key-sci" onclick="appendFunction('cbrt')">∛x</button>
                        </div>
                    </div>
                    <div class="sci-group">
                        <div class="sci-group-label">MISC</div>
                        <div class="sci-buttons">
                            <button class="key key-sci" onclick="appendFunction('abs')">|x|</button>
                            <button class="key key-sci" onclick="appendFunction('ceil')">⌈x⌉</button>
                            <button class="key key-sci" onclick="appendFunction('floor')">⌊x⌋</button>
                            <button class="key key-sci" onclick="appendFunction('round')">rnd</button>
                            <button class="key key-sci" onclick="appendFunction('deg')">→°</button>
                            <button class="key key-sci" onclick="appendFunction('rad')">→rad</button>
                        </div>
                    </div>
                </div>

                <!-- Constants + Memory row -->
                <div class="bottom-row">
                    <div class="const-group">
                        <span class="row-label">CONST</span>
                        <button class="key key-const" onclick="appendChar('pi')">π</button>
                        <button class="key key-const" onclick="appendChar('e')">e</button>
                        <button class="key key-const" onclick="appendChar('ans')">ANS</button>
                    </div>
                    <div class="mem-group">
                        <span class="row-label">MEM</span>
                        <button class="key key-mem" onclick="storeMemory()">M+</button>
                        <button class="key key-mem" onclick="recallMemory()">MR</button>
                        <button class="key key-mem key-mem-clear" onclick="clearMemory()">MC</button>
                    </div>
                </div>
            </main>

            <!-- RIGHT: Sidebar -->
            <aside class="sidebar">
                <!-- History panel -->
                <div class="side-panel history-panel" id="historyPanel">
                    <div class="panel-header">
                        <span class="panel-title">HISTORY</span>
                        <button class="panel-action" onclick="clearHistory()">CLEAR</button>
                    </div>
                    <div class="history-list" id="historyList">
                        <div class="history-empty">No calculations yet</div>
                    </div>
                </div>

                <!-- Memory panel -->
                <div class="side-panel memory-panel">
                    <div class="panel-header">
                        <span class="panel-title">MEMORY</span>
                    </div>
                    <div class="memory-value" id="memoryDisplay">0</div>
                    <div class="memory-sub">stored value</div>
                </div>

                <!-- Quick Reference -->
                <div class="side-panel ref-panel">
                    <div class="panel-header">
                        <span class="panel-title">REFERENCE</span>
                    </div>
                    <div class="ref-list">
                        <div class="ref-item"><span class="ref-key">pow(a,b)</span><span class="ref-desc">aᵇ</span></div>
                        <div class="ref-item"><span class="ref-key">hypot(a,b)</span><span class="ref-desc">√(a²+b²)</span></div>
                        <div class="ref-item"><span class="ref-key">log(x, b)</span><span class="ref-desc">log base b</span></div>
                        <div class="ref-item"><span class="ref-key">sinh / cosh / tanh</span><span class="ref-desc">hyperbolic</span></div>
                        <div class="ref-item"><span class="ref-key">^ operator</span><span class="ref-desc">2^10 = 1024</span></div>
                        <div class="ref-item"><span class="ref-key">ans</span><span class="ref-desc">last result</span></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer"></div>

    <script src="calculator.js"></script>
</body>
</html>
